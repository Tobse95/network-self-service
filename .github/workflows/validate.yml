name: Validate subnet request

on:
  pull_request:
    paths:
      - "requests/**"
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate & plan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true
          cache-dependency-path: scripts/go.sum

      - name: Build tools
        working-directory: scripts
        run: |
          go mod download
          go build -o ../bin/validate ./cmd/validate
          go build -o ../bin/orchestrate ./cmd/orchestrate

      - name: Find changed request files
        id: changed
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- requests/ \
            | grep '\.ya\?ml$' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Validate each request
        id: validate
        run: |
          EXIT=0
          REPORT=""

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "Validating: $file"
            if OUTPUT=$(./bin/validate --request "$file" --summary 2>&1); then
              REPORT="${REPORT}\n---\n### \`${file}\`\n\n${OUTPUT}"
            else
              REPORT="${REPORT}\n---\n### \`${file}\` — FAILED\n\n\`\`\`\n${OUTPUT}\n\`\`\`"
              EXIT=1
            fi
          done <<< "${{ steps.changed.outputs.files }}"

          {
            echo "REPORT<<ENDOFBLOCK"
            echo -e "$REPORT"
            echo "ENDOFBLOCK"
          } >> $GITHUB_OUTPUT

          exit $EXIT

      - name: Post plan as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.validate.outputs.REPORT }}`;
            const status = '${{ steps.validate.outcome }}' === 'success'
              ? '✅ All requests valid — merge to open IAC pull requests'
              : '❌ Validation failed — see details below';

            const body = `## Self-Service Subnet Pipeline\n\n${status}\n\n${report}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Self-Service Subnet Pipeline')
            );
            const method = existing ? 'updateComment' : 'createComment';
            const args = existing
              ? { owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body }
              : { owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body };
            await github.rest.issues[method](args);
