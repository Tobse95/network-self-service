name: Orchestrate subnet provisioning

on:
  push:
    paths:
      - "requests/**"
    branches:
      - main

permissions:
  contents: write

jobs:
  orchestrate:
    name: Generate variable files & open IAC pull requests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true
          cache-dependency-path: scripts/go.sum

      - name: Build tools
        working-directory: scripts
        run: |
          go mod download
          go build -o ../bin/validate ./cmd/validate
          go build -o ../bin/orchestrate ./cmd/orchestrate

      - name: Detect new/modified request files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=AM HEAD~1..HEAD -- requests/ \
            | grep '\.ya\?ml$' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Validate before orchestrating
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "Pre-flight: $file"
            ./bin/validate --request "$file"
          done <<< "${{ steps.changed.outputs.files }}"

      - name: Orchestrate each request
        env:
          SELF_SERVICE_GITHUB_TOKEN: ${{ secrets.SELF_SERVICE_GITHUB_TOKEN }}
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "Orchestrating: $file"
            ./bin/orchestrate --request "$file"
          done <<< "${{ steps.changed.outputs.files }}"

      - name: Commit updated VLAN state
        run: |
          git config user.name  "self-service-bot"
          git config user.email "self-service-bot@noreply.github.com"
          git add state/vlan-allocations.yaml
          if git diff --cached --quiet; then
            echo "No state changes"
          else
            git commit -m "chore: update vlan allocations [skip ci]"
            git push
          fi
