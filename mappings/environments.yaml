# Ops-managed mapping: logical environment key → physical infrastructure repos.
# The self-service orchestrator reads this to know where to open PRs and what
# variable values to pass to each IAC repo.

environments:

  demo:
    display_name: "Demo Environment"
    subnet_pool:
      parent_block: "10.20.0.0/16"
      default_size: 24
    aci:
      github_owner: "Tobse95"
      github_repo: "demo-aci-iac"
      tenant: "DEMO_TENANT"
      vrf: "DEMO_VRF"
      ap: "AP_DEMO"
      domain: "phys_domain_demo"
    bluecat:
      github_owner: "Tobse95"
      github_repo: "demo-bluecat-iac"
      configuration: "DEMO"
      view: "Internal"
      parent_block: "10.0.0.0/8"
    f5:
      github_owner: "Tobse95"
      github_repo: "demo-f5-iac"
      vlan_pool: [100, 999]
      devices:
        - folder: "hypervisor01-primary"
          role: hypervisor
          selfip_offset: 2
          floating_selfip_offset: 1
          interfaces:
            - name: "1.1"
              tagged: true
        - folder: "hypervisor01-secondary"
          role: hypervisor
          selfip_offset: 3
          floating_selfip_offset: 1
          interfaces:
            - name: "1.1"
              tagged: true
        - folder: "loadbalancer01-primary"
          role: loadbalancer
          selfip_offset: 4
          floating_selfip_offset: 1
          interfaces:
            - name: "1.1"
              tagged: true
        - folder: "loadbalancer01-secondary"
          role: loadbalancer
          selfip_offset: 5
          floating_selfip_offset: 1
          interfaces:
            - name: "1.1"
              tagged: true
        - folder: "loadbalancer02-primary"
          role: loadbalancer
          selfip_offset: 6
          floating_selfip_offset: 1
          interfaces:
            - name: "1.1"
              tagged: true
        - folder: "loadbalancer02-secondary"
          role: loadbalancer
          selfip_offset: 7
          floating_selfip_offset: 1
          interfaces:
            - name: "1.1"
              tagged: true

